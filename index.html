<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animación de Tulipanes</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Nubes animadas -->
    <div class="clouds">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="cloud cloud-4"></div>
    </div>

    <!-- Brotes de pasto en el suelo -->
    <div class="ground">
        <div class="grass grass-1"></div>
        <div class="grass grass-2"></div>
        <div class="grass grass-3"></div>
        <div class="grass grass-4"></div>
        <div class="grass grass-5"></div>
        <div class="grass grass-6"></div>
        <div class="grass grass-7"></div>
    </div>
    
    <div class="garden">
        <div class="plant-container">
            <!-- Tulipán Izquierdo -->
            <div class="tulip tulip-left">
                <div class="stem"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>

                <div class="flower">
                    <div class="petal petal-left"></div>
                    <div class="petal petal-right"></div>
                    <div class="petal petal-center"></div>
                </div>
            </div>

            <!-- Tulipán Central -->
            <div class="tulip tulip-center">
                <div class="stem"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>

                <div class="flower">
                    <div class="petal petal-left"></div>
                    <div class="petal petal-right"></div>
                    <div class="petal petal-center"></div>
                </div>
            </div>

            <!-- Tulipán Derecho -->
            <div class="tulip tulip-right">
                <div class="stem"></div>
                <div class="leaf left"></div>
                <div class="leaf right"></div>

                <div class="flower">
                    <div class="petal petal-left"></div>
                    <div class="petal petal-right"></div>
                    <div class="petal petal-center"></div>
                </div>
            </div>

            <div class="pot"></div>
        </div>

        <button id="action-btn">Plantar y Crecer 🌷</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
